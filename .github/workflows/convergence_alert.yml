name: Convergence Alert

on:
  schedule:
    # 02:00 UTC = 12:00 AEST (UTC+10) / 13:00 AEDT (UTC+11, daylight saving)
    # Runs ~7h after the 19:00 UTC morning digest
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convergence-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run convergence check
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          YAHOO_EMAIL:        ${{ secrets.YAHOO_EMAIL }}
          YAHOO_APP_PASSWORD: ${{ secrets.YAHOO_APP_PASSWORD }}
          RECIPIENT_EMAIL:    ${{ secrets.RECIPIENT_EMAIL }}
        run: python scripts/market_monitor.py --convergence-check

      - name: Commit alert log
        run: |
          git config --local user.email "market-monitor-bot@users.noreply.github.com"
          git config --local user.name  "Market Monitor Bot"
          git pull --rebase --autostash origin main
          git add data/
          if ! git diff --staged --quiet; then
            git commit -m "chore: convergence alert log $(date -u +%Y-%m-%d)"
            git push
          fi
