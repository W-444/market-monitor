name: Market Intelligence Monitor

on:
  schedule:
    # 05:00 UTC daily = ~06:00 CET (winter) / 07:00 CEST (summer)
    # Adjust to suit your timezone: https://crontab.guru
    - cron: "0 5 * * *"
  workflow_dispatch:   # lets you trigger a run manually from GitHub Actions UI

permissions:
  contents: write      # needed to commit data files back to the repo

jobs:
  market-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run market monitor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          YAHOO_EMAIL:       ${{ secrets.YAHOO_EMAIL }}
          YAHOO_APP_PASSWORD: ${{ secrets.YAHOO_APP_PASSWORD }}
          RECIPIENT_EMAIL:   ${{ secrets.RECIPIENT_EMAIL }}
        run: python scripts/market_monitor.py

      - name: Commit updated data files
        run: |
          git config --local user.email "market-monitor-bot@users.noreply.github.com"
          git config --local user.name  "Market Monitor Bot"
          git pull --rebase origin main   # pull any remote changes BEFORE staging
          git add data/
          if ! git diff --staged --quiet; then
            git commit -m "chore: market data $(date -u +%Y-%m-%d)"
            git push
          fi
